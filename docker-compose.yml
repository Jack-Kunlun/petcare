version: "3.8"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: petcare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-petcare}
      POSTGRES_USER: ${DB_USERNAME:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${EXPOSE_DB_PORT:-}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-user} -d ${DB_NAME:-petcare}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - petcare-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: petcare-redis
    restart: unless-stopped
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 256mb 
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-ChangeMeToStrongPassword123!}
    ports:
      - "${EXPOSE_REDIS_PORT:-}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ChangeMeToStrongPassword123!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - petcare-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # 后端服务
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        NODE_ENV: production
    container_name: petcare-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 数据库配置（使用Docker内部网络）
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-petcare}
      DB_SCHEMA: public
      # Redis配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # JWT配置
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-random-secret-key-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      # 服务器配置
      PORT: 3001
      NODE_ENV: production
      # API配置
      API_BASE_URL: http://localhost:3001/api
    ports:
      - "3001:3001"
    volumes:
      - ./logs/server:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api-docs || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - petcare-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

  # 后台管理系统
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        NODE_ENV: production
    container_name: petcare-admin
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      - NGINX_PROXY_PASS=http://server:3001
    ports:
      - "80:80"
    volumes:
      - ./logs/nginx:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - petcare-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  petcare-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
