services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: petcare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-petcare}
      POSTGRES_USER: ${DB_USERNAME:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${EXPOSE_DB_PORT:-}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-user} -d ${DB_NAME:-petcare}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - petcare-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: petcare-redis
    restart: unless-stopped
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 256mb 
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-ChangeMeToStrongPassword123!}
    ports:
      - "${EXPOSE_REDIS_PORT:-}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ChangeMeToStrongPassword123!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - petcare-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # 后端服务
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: petcare-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 数据库配置（使用Docker内部网络）
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-petcare}
      DB_SCHEMA: public
      # Redis配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ChangeMeToStrongPassword123!}
      # 异步任务配置；未来独立 Worker 与 API 必须使用相同值
      QUEUE_PREFIX: ${QUEUE_PREFIX:-petcare}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
      ORDER_TIMEOUT_DELAY_MS: ${ORDER_TIMEOUT_DELAY_MS:-172800000}
      # JWT配置
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-random-secret-key-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-604800}
      # 管理员初始化与本地短信模拟
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PHONE: ${DEFAULT_ADMIN_PHONE:-}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-}
      SMS_DEV_CODE: ${SMS_DEV_CODE:-}
      SMS_CODE_TTL_SECONDS: ${SMS_CODE_TTL_SECONDS:-300}
      SMS_SEND_COOLDOWN_SECONDS: ${SMS_SEND_COOLDOWN_SECONDS:-60}
      SMS_HOURLY_LIMIT: ${SMS_HOURLY_LIMIT:-5}
      SMS_MAX_ATTEMPTS: ${SMS_MAX_ATTEMPTS:-5}
      CAPTCHA_TTL_SECONDS: ${CAPTCHA_TTL_SECONDS:-300}
      CAPTCHA_MAX_ATTEMPTS: ${CAPTCHA_MAX_ATTEMPTS:-5}
      # 服务器配置
      PORT: 3000
      NODE_ENV: production
      # 日志配置；生产环境即使设置 debug 也不会记录原始请求正文
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /app/logs
      # API配置
      API_BASE_URL: http://localhost:8986/api
      # Docker 管理端与本地 Vite 开发服务器的跨域来源
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8986,http://127.0.0.1:8986}
      # 微信小程序配置
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
    ports:
      - "3000:3000"
    volumes:
      - ./logs/server:/app/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3000/health'').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - petcare-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

  # 后台管理系统
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: petcare-admin
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8986:80"
    volumes:
      - ./logs/nginx:/var/log/nginx
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - petcare-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  petcare-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
